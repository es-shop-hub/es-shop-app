<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' https://www.gstatic.com https://www.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com;
connect-src 'self' https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
img-src 'self' data: https:;
style-src 'self' 'unsafe-inline';
font-src 'self' https:;
frame-src https://*.firebaseapp.com;
object-src 'none';
base-uri 'self';
form-action 'self';
">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow - Demande client</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:radial-gradient(circle at top,#1a1a1a,#0a0a0a 70%);
  color:#fff;
  min-height:100vh;
  padding:20px 15px 100px;
}

.header{
  margin-bottom:20px;
}

.header h1{
  font-size:26px;
  margin-bottom:6px;
}

.header p{
  color:#aaa;
  font-size:13px;
}

.back-link{
  display:inline-block;
  margin-bottom:16px;
  color:#D4AF37;
  text-decoration:none;
  font-size:13px;
}

.form-box{
  background:#151515;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}

.form-box h2{
  font-size:16px;
  margin-bottom:14px;
}

label{
  display:block;
  font-size:12px;
  color:#aaa;
  margin-bottom:6px;
}

input,textarea{
  width:100%;
  background:#111;
  color:#fff;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  margin-bottom:14px;
}

textarea{
  min-height:80px;
  resize:vertical;
}

button{
  width:100%;
  background:#D4AF37;
  color:#111;
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

.hint{
  font-size:12px;
  color:#888;
  margin-top:-8px;
  margin-bottom:14px;
}

#feedback{
  font-size:13px;
  margin-top:12px;
  min-height:18px;
}

#feedback.error{color:#ff6b6b;}
#feedback.success{color:#58d68d;}

.warning-box{
  display:none;
  background:rgba(230,126,34,0.12);
  border:1px solid rgba(230,126,34,0.35);
  border-radius:10px;
  padding:10px 12px;
  font-size:13px;
  color:#f5b041;
  margin-bottom:14px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  left:0;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 10px;
  gap:6px;
  z-index:1000;
}

nav .nav-item{
  flex:1;
  min-width:0;
  text-align:center;
  padding:7px 5px;
  border-radius:7px;
  text-decoration:none;
  color:inherit;
  font-size:11px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

nav .nav-item.active{
  background:rgba(212,175,55,0.12);
  color:#D4AF37;
  font-weight:bold;
}
</style>
</head>
<body>

<a class="back-link" href="ranging.html">← Retour ranking</a>

<div class="header">
  <h1>➕ Demande client</h1>
  <p>Enregistrer un produit demandé mais absent du catalogue.</p>
</div>

<form id="demandForm" class="form-box" novalidate>
  <h2>Nouvelle demande</h2>

  <label for="demandLabel">Nom du produit demandé</label>
  <input type="text" id="demandLabel" maxlength="120" required placeholder="Ex: Riz 25 kg">

  <label for="demandNote">Note / variante (optionnel)</label>
  <textarea id="demandNote" maxlength="240" placeholder="Marque, format, couleur..."></textarea>

  <div class="hint">
    Si la même demande existe déjà, le compteur sera incrémenté automatiquement.
  </div>

  <div id="catalogWarning" class="warning-box" role="status"></div>

  <button type="submit" id="saveDemandBtn">Enregistrer la demande</button>
  <div id="feedback" aria-live="polite"></div>
</form>

<nav>
  <a class="nav-item" href="index.html">🛒 Vente</a>
  <a class="nav-item" href="products.html">📦 Produits</a>
  <a class="nav-item active" href="demand_add.html">➕ Demande</a>
  <a class="nav-item" href="ranging.html">🏆 Ranking</a>
  <a class="nav-item" href="pages.html">🔗 navigation</a>
</nav>

<script type="module" src="js/demand-add.js"></script>
</body>
</html>
