<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' https://www.gstatic.com https://www.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com;
connect-src 'self' https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
img-src 'self' data: https:;
style-src 'self' 'unsafe-inline';
font-src 'self' https:;
frame-src https://*.firebaseapp.com;
object-src 'none';
base-uri 'self';
form-action 'self';
">
  <title>Demandes produits — Ajout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0 0 100px;
      background: #f5f6fa;
      color: #111;
    }
    header {
      background: #0B3D2E;
      color: #fff;
      padding: 14px;
    }
    .container {
      max-width: 760px;
      margin: 16px auto;
      padding: 0 12px;
      box-sizing: border-box;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 10px;
      color: #0B3D2E;
      text-decoration: none;
      font-weight: 600;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .card h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 13px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
      color: #111;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
    }
    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }
    .warning-box {
      display: none;
      margin-top: 10px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: #0B3D2E;
      color: #fff;
    }
    .btn-link {
      background: #eef2ff;
      color: #1e3a8a;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    #feedback {
      margin-top: 10px;
      min-height: 18px;
      font-size: 13px;
    }
    #feedback.success { color: #166534; }
    #feedback.error { color: #b91c1c; }
    .list-card {
      margin-top: 14px;
    }
    .list-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .list-toolbar button {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #eef2ff;
      color: #1e3a8a;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }
    .demand-item {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #f8fafc;
    }
    .demand-item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .demand-item-title {
      font-weight: 700;
      font-size: 14px;
      color: #111827;
      word-break: break-word;
    }
    .demand-item-count {
      font-size: 12px;
      font-weight: 700;
      color: #0B3D2E;
      white-space: nowrap;
    }
    .demand-item-note {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
      word-break: break-word;
    }
    .demand-item-meta {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn-row {
      border: none;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-inc { background: #dcfce7; color: #166534; }
    .btn-edit { background: #dbeafe; color: #1e3a8a; }
    .btn-delete { background: #fee2e2; color: #991b1b; }
    .empty-list {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      padding: 16px 8px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 18px;
      z-index: 1000;
    }
    .modal.show { display: flex; }
    .modal-content {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }
    .modal-content h4 {
      margin: 0 0 12px;
      font-size: 17px;
      color: #0B3D2E;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .modal-actions button {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-save { background: #0B3D2E; color: #fff; }
    .modal-cancel { background: #e5e7eb; color: #111; }
  nav {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      background: #111;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding: 8px 10px;
      box-sizing: border-box;
      z-index: 999;
    }
    .nav-item {
      flex: 1;
      min-width: 0;
      text-align: center;
      text-decoration: none;
      color: #e5e5e5;
      font-size: 11px;
      padding: 8px 4px;
      border-radius: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-item.active {
      background: rgba(212, 175, 55, 0.12);
      color: #D4AF37;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header>
    <h3>StockFlow — Demandes produits</h3>
  </header>

  <div class="container">
    <a class="back-link" href="../pages.html">← Navigation</a>

    <section class="card">
      <h3>➕ Ajouter / incrémenter une demande</h3>

      <label for="demandLabel">Nom du produit demandé</label>
      <input type="text" id="demandLabel" maxlength="120" placeholder="Ex: Riz 25 kg" required>

      <label for="demandNote">Note / variante (optionnel)</label>
      <textarea id="demandNote" maxlength="240" placeholder="Marque, format, couleur..."></textarea>

      <p class="hint">Si le produit existe déjà dans les demandes actives, le compteur augmente automatiquement.</p>

      <div id="catalogWarning" class="warning-box" role="status"></div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="saveDemandBtn">Enregistrer</button>
        <a class="btn btn-link" href="./demand_stats.html">Voir les stats</a>
      </div>
      <div id="feedback" aria-live="polite"></div>
    </section>

    <section class="card list-card">
      <div class="list-toolbar">
        <h3>📋 Demandes en cours</h3>
        <button type="button" id="refreshDemandsBtn">Actualiser</button>
      </div>
      <div id="demandsList" aria-live="polite"></div>
    </section>
  </div>

  <div id="editDemandModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h4>Modifier la demande</h4>
      <label for="editDemandLabel">Nom du produit</label>
      <input type="text" id="editDemandLabel" maxlength="120">
      <label for="editDemandNote">Note</label>
      <textarea id="editDemandNote" maxlength="240"></textarea>
      <div class="modal-actions">
        <button type="button" class="modal-save" id="editDemandSaveBtn">Enregistrer</button>
        <button type="button" class="modal-cancel" id="editDemandCancelBtn">Annuler</button>
      </div>
    </div>
  </div>

  <nav>
    <a class="nav-item" href="../index.html">🛒 Vente</a>
    <a class="nav-item" href="../products.html">📦 Produits</a>
    <a class="nav-item active" href="./demand_add.html">➕ Demande</a>
    <a class="nav-item" href="./demand_stats.html">📊 Stats</a>
    <a class="nav-item" href="../pages.html">🔗 Menu</a>
  </nav>

  <script type="module" src="./js/demand-add.js"></script>
</body>
</html>
